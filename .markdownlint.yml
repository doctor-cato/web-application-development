# Configuration for markdownlint
default: true

# Disable strict formatting rules that cause CI failures
MD009: false # Trailing spaces
MD012: false # Multiple consecutive blank lines
MD013: false # Line length
MD022: false # Blanks around headings
MD026: false # Trailing punctuation in heading
MD031: false # Blanks around fences/code blocks
MD032: false # Blanks around lists
MD060: false # Table column style (missing spaces around pipes)

# MD033/no-inline-html - Inline HTML
MD033:
  allowed_elements:
    - details
    - summary
    - img
    - span
    - div
    - br
    - kbd
    - table
    - tr
    - td
    - th

# MD024/no-duplicate-heading - Multiple headings with the same content
MD024:
  siblings_only: true

# MD041/first-line-heading/first-line-h1 - First line in file should be a top level heading
MD041: true

# MD007/ul-indent - Unordered list indentation
MD007:
  indent: 2
