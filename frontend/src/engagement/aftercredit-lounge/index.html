<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đánh Giá Phim - 3HD2K</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Bebas+Neue&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared/css/main.css">
    <link rel="stylesheet" href="/engagement/aftercredit-lounge/css/style.css">
</head>
<body>
    <div id="navbar-placeholder"></div>
    
    <!-- Dynamic Fullscreen Background -->
    <div class="immersive-bg" id="immersive-bg"></div>
    
    <div class="rating-app-container">
        
        <!-- Case 1: Has recent movie -->
        <div class="rating-card glass-panel" id="rating-card-view">
            <h1 class="rating-title">BẠN CẢM THẤY THẾ NÀO VỀ BỘ PHIM?</h1>
            <p class="rating-subtitle" id="movie-title-display">Đang tải...</p>
            
            <div class="movie-poster-mini" id="movie-poster-display"></div>

            <div class="stars-container" id="stars-container">
                <i class="fa-solid fa-star star" data-value="1"></i>
                <i class="fa-solid fa-star star" data-value="2"></i>
                <i class="fa-solid fa-star star" data-value="3"></i>
                <i class="fa-solid fa-star star" data-value="4"></i>
                <i class="fa-solid fa-star star" data-value="5"></i>
            </div>
            <div class="rating-text" id="rating-text">Chưa đánh giá</div>

            <textarea class="review-input" id="review-input" placeholder="Bạn ấn tượng nhất điều gì về bộ phim này?" rows="3"></textarea>

            <button class="btn btn-submit-rating" id="btn-submit-rating">GỬI ĐÁNH GIÁ</button>
        </div>

        <!-- Case 2: No recent movie -->
        <div class="no-movie-card glass-panel" id="no-movie-view" style="display: none;">
            <i class="fa-solid fa-film" style="font-size: 4rem; color: rgba(255,255,255,0.2); margin-bottom: 20px;"></i>
            <h2 style="font-family: 'Bebas Neue', sans-serif; font-size: 2rem; margin: 0 0 10px 0;">CHƯA CÓ TRẢI NGHIỆM GẦN ĐÂY</h2>
            <p style="color: var(--text-muted); margin-bottom: 30px;">Hệ thống không tìm thấy lịch sử xem phim gần nhất của bạn. Hãy thưởng thức một tác phẩm điện ảnh trước khi đánh giá nhé!</p>
            <a href="/explore/home-page/index.html" class="btn btn-outline-small" style="padding: 12px 24px; text-decoration: none; display: inline-block;">KHÁM PHÁ PHIM ĐANG CHIẾU</a>
        </div>

        <!-- Success Animation View -->
        <div class="success-view" id="success-view" style="display: none;">
            <div class="success-circle">
                <i class="fa-solid fa-check"></i>
            </div>
            <h2 class="success-title">CẢM ƠN BẠN!</h2>
            <p class="success-text">Đánh giá của bạn đã được ghi nhận vào hệ thống.</p>
        </div>

    </div>

    <div id="footer-placeholder"></div>

    <script type="module" src="/shared/components/navbar.js"></script>
    <script type="module" src="/shared/components/footer.js"></script>
    <script type="module" src="/engagement/aftercredit-lounge/js/script.js"></script>
</body>
</html>
