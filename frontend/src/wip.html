<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" type="image/jpeg" href="/assets/favicon.jpg?v=2">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work In Progress - 3HD2K Cinema</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #121414; /* bg-background */
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        h1 {
            font-family: 'Inter', cursive;
            font-size: 4rem;
            color: #e50914; /* primary-red */
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.1rem;
            color: #c8c6c5;
            max-width: 600px;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .gif-placeholder {
            width: 100%;
            max-width: 500px;
            height: auto;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            /* Khu vực giữ chỗ nếu bạn chưa chèn thẻ img */
            min-height: 250px;
            background: #1a1c1c; /* surface-container-low */
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            font-style: italic;
            border: 1px dashed #343535;
        }
        .gif-img {
            width: 100%;
            max-width: 500px;
            height: auto;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .btn-home {
            background-color: #e50914;
            color: #ffffff;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }
        .btn-home:hover {
            background-color: #cc0812;
            transform: translateY(-2px);
        }
        .btn-home i {
            margin-right: 8px;
        }
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; word-break: break-word; }
            p { font-size: 1rem; }
            .gif-placeholder { min-height: 180px; }
        }
        /* ponytail: responsive fixes for small mobile */
        @media (max-width: 480px) {
            h1 { font-size: 2rem; }
            p { font-size: 0.925rem; padding: 0 10px; }
            .gif-placeholder, .gif-img { max-width: 100%; min-height: 150px; }
            .btn-home { width: 100%; max-width: 280px; box-sizing: border-box; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>WORK IN PROGRESS</h1>
        <p>Tính năng này đang được chúng tôi phát triển và sẽ sớm ra mắt trong thời gian tới. Mong bạn thông cảm và tiếp tục ủng hộ 3HD2K Cinema!</p>
        
        <img src="assets/denji-waiting.gif" class="gif-img" alt="Work In Progress">
        
        <a href="./explore/home-page/index.html" class="btn-home">
            <i class="fas fa-arrow-left"></i> Quay lại Trang chủ
        </a>
    </div>
</body>
</html>
