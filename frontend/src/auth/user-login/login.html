<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Đăng nhập - 3HD2K Cinema</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <!-- Vanilla CSS -->
    <link rel="stylesheet" href="/auth/auth-services/auth.css?v=4">
</head>
<body>

    <header class="auth-header">
        <a class="auth-logo" href="/explore/home-page/index.html">3HD2K</a>
    </header>

    <main class="auth-main">
        <!-- Left Side: Banner (Hidden on Mobile) -->
        <div class="auth-banner">
            <div class="auth-banner-bg">
                <img src="/shared/images/cinema_audience_smiling.png" alt="Cinema Background">
            </div>
            <a href="/explore/home-page/index.html" class="back-home-link">
                <span class="material-symbols-outlined">arrow_back</span>
                Về trang chủ
            </a>
            <h1 class="auth-banner-title">
                Trải Nghiệm Điện Ảnh <br><span>Đỉnh Cao</span>
            </h1>
        </div>

        <!-- Right Side: Form Container -->
        <div class="auth-content">
            <div class="auth-box">
                <!-- Tabs -->
                <div class="auth-tabs">
                    <a href="/auth/user-login/login.html" class="auth-tab active">Đăng Nhập</a>
                    <a href="/auth/user-register/register.html" class="auth-tab">Đăng Ký</a>
                </div>

                <!-- Error Banner (Global) -->
                <div id="form-error-banner" class="form-error-banner"></div>

                <!-- Form -->
                <form id="loginForm" class="auth-form" action="/explore/home-page/index.html" method="GET">
                    <!-- Email -->
                    <div class="form-group">
                        <label for="email">Email</label>
                        <div class="input-wrapper">
                            <span class="material-symbols-outlined">person</span>
                            <input class="auth-input" type="email" id="email" name="email" placeholder="example@email.com" required>
                        </div>
                        <div id="email-error" class="inline-error">Email không hợp lệ.</div>
                    </div>

                    <!-- Password -->
                    <div class="form-group">
                        <label for="password">Mật khẩu</label>
                        <div class="input-wrapper">
                            <span class="material-symbols-outlined">lock</span>
                            <input class="auth-input has-toggle" type="password" id="password" placeholder="••••••••" required>
                            <span class="material-symbols-outlined password-toggle" id="togglePassword" style="pointer-events: auto; z-index: 10;">visibility_off</span>
                        </div>
                        <div id="password-error" class="inline-error">Mật khẩu phải có ít nhất 6 ký tự.</div>
                    </div>

                    <!-- Forgot Password Link -->
                    <div style="text-align: right; margin-bottom: 1.5rem; margin-top: -0.5rem;">
                        <a href="/auth/forgot-password/index.html" style="font-size: 13px; color: var(--primary-red); text-decoration: none;">
                            Quên mật khẩu?
                        </a>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="btn-submit">
                        Đăng Nhập
                    </button>
                </form>
            </div>
        </div>
    </main>

    <footer class="auth-footer">
        <span class="footer-logo">3HD2K</span>
        <div class="footer-copy">© 2026 3HD2K Cinema. All rights reserved.</div>
    </footer>

    <script type="module" src="/auth/user-login/login.js"></script>
</body>
</html>
