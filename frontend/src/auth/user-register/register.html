<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" type="image/jpeg" href="/assets/favicon.jpg">
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta name="description" content="Đăng ký tài khoản 3HD2K Cinema để trở thành thành viên, nhận điểm thưởng, khuyến mãi và đặt vé nhanh chóng.">
    <meta property="og:title" content="Đăng Ký Tài Khoản - 3HD2K Cinema">
    <meta property="og:description" content="Trở thành thành viên 3HD2K Cinema để tận hưởng nhiều ưu đãi xem phim hấp dẫn.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/assets/favicon.jpg">
    <title>Đăng ký - 3HD2K Cinema</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <!-- Vanilla CSS -->
    <link rel="stylesheet" href="../../auth/auth-services/auth.css?v=4">
</head>
<body>

    <header class="auth-header">
        <a class="auth-logo" href="../../explore/home-page/index.html">3HD2K</a>
    </header>

    <main class="auth-main">
        <!-- Left Side: Banner (Hidden on Mobile) -->
        <div class="auth-banner">
            <div class="auth-banner-bg">
                <img src="../../shared/images/cinema_audience_smiling.png" alt="Cinema Background">
            </div>
            <a href="../../explore/home-page/index.html" class="back-home-link">
                <span class="material-symbols-outlined">arrow_back</span>
                Về trang chủ
            </a>
            <h1 class="auth-banner-title">
                Trải Nghiệm Điện Ảnh <br><span>Đỉnh Cao</span>
            </h1>
        </div>

        <!-- Right Side: Form Container -->
        <div class="auth-content">
            <div class="auth-box register-box">
                <!-- Tabs -->
                <div class="auth-tabs">
                    <a href="../../auth/user-login/login.html" class="auth-tab">Đăng Nhập</a>
                    <a href="../../auth/user-register/register.html" class="auth-tab active">Đăng Ký</a>
                </div>

                <!-- Error Banner (Global) -->
                <div id="form-error-banner" class="form-error-banner"></div>

                <!-- Form -->
                <form id="registerForm" class="auth-form" action="../../explore/home-page/index.html" method="GET">
                    


                    <!-- Full Name -->
                    <div class="form-group">
                        <label for="fullname">Họ và tên</label>
                        <div class="input-wrapper">
                            <span class="material-symbols-outlined">badge</span>
                            <input class="auth-input" type="text" id="fullname" name="fullname" placeholder="Nguyễn Văn A" required>
                        </div>
                    </div>

                    <!-- DOB & Phone Row -->
                    <div class="form-row-2col">
                        <div class="form-group" style="flex: 1;">
                            <label for="dob">Ngày sinh</label>
                            <div class="input-wrapper">
                                <span class="material-symbols-outlined">calendar_month</span>
                                <input class="auth-input" type="date" id="dob" name="dob" required>
                            </div>
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label for="phone">Số điện thoại</label>
                            <div class="input-wrapper">
                                <span class="material-symbols-outlined">call</span>
                                <input class="auth-input" type="tel" id="phone" name="phone" placeholder="0987654321" required>
                            </div>
                            <div id="phone-error" class="inline-error">SĐT không hợp lệ (10 số).</div>
                        </div>
                    </div>

                    <!-- Gender -->
                    <div class="form-group" style="margin-top: 10px; margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 8px;">Giới tính</label>
                        <div class="gender-options">
                            <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                                <input type="radio" name="gender" value="male" checked> Nam
                            </label>
                            <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                                <input type="radio" name="gender" value="female"> Nữ
                            </label>
                            <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                                <input type="radio" name="gender" value="other"> Khác
                            </label>
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="form-group">
                        <label for="email">Email</label>
                        <div class="input-wrapper">
                            <span class="material-symbols-outlined">mail</span>
                            <input class="auth-input" type="email" id="email" name="email" placeholder="example@email.com" required>
                        </div>
                        <div id="email-error" class="inline-error">Email này đã tồn tại.</div>
                    </div>

                    <!-- Password Row -->
                    <div class="form-row-2col">
                        <div class="form-group" style="flex: 1;">
                            <label for="password">Mật khẩu</label>
                            <div class="input-wrapper">
                                <span class="material-symbols-outlined">lock</span>
                                <input class="auth-input has-toggle" type="password" id="password" placeholder="••••••••" required>
                                <span class="material-symbols-outlined password-toggle togglePasswordBtn" data-target="password" style="pointer-events: auto; z-index: 10;">visibility_off</span>
                            </div>
                            <div id="pwd-error" class="inline-error">Tối thiểu 6 ký tự.</div>
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label for="confirm_password">Xác nhận MK</label>
                            <div class="input-wrapper">
                                <span class="material-symbols-outlined">lock</span>
                                <input class="auth-input has-toggle" type="password" id="confirm_password" placeholder="••••••••" required>
                                <span class="material-symbols-outlined password-toggle togglePasswordBtn" data-target="confirm_password" style="pointer-events: auto; z-index: 10;">visibility_off</span>
                            </div>
                            <div id="confirm-pwd-error" class="inline-error">Mật khẩu không khớp.</div>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="btn-submit">
                        Tạo Tài Khoản
                    </button>
                </form>
            </div>
        </div>
    </main>

    <footer class="auth-footer">
        <span class="footer-logo">3HD2K</span>
        <div class="footer-copy">© 2026 3HD2K Cinema. All rights reserved.</div>
    </footer>

    <script type="module" src="../../auth/user-register/register.js?v=2"></script>
</body>
</html>
