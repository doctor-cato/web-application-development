<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3HD2K - Danh sách phim</title>
    <link rel="stylesheet" href="/shared/css/main.css">
    <link rel="stylesheet" href="/explore/movie-search/movies.css">
    <!-- Load custom fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <main class="movies-page">
        <!-- BREADCRUMB -->
        <div class="breadcrumb">
            <a href="/explore/home-page/index.html">Trang chủ</a>
            <span class="separator"><i class="fas fa-chevron-right"></i></span>
            <span class="current" id="breadcrumb-current">Phim Đang Chiếu</span>
        </div>

        <!-- TABS -->
        <div class="page-tabs">
            <button class="tab" id="tab-now-showing" data-tab="now-showing">Phim Đang Chiếu</button>
            <button class="tab" id="tab-coming-soon" data-tab="coming-soon">Phim Sắp Chiếu</button>
        </div>
        <script>
            // Chạy đồng bộ ngay lập tức để đặt đúng vị trí gạch đỏ trước khi trình duyệt vẽ giao diện
            (function() {
                const params = new URLSearchParams(window.location.search);
                const tab = params.get('tab') || 'now-showing';
                const activeBtn = document.getElementById('tab-' + tab);
                if(activeBtn) activeBtn.classList.add('active');
                
                const breadcrumbCurrent = document.getElementById('breadcrumb-current');
                if(breadcrumbCurrent) {
                    breadcrumbCurrent.textContent = tab === 'coming-soon' ? 'Phim Sắp Chiếu' : 'Phim Đang Chiếu';
                }
            })();
        </script>

        <!-- FILTER BAR -->
        <div class="movies-filters">
            <div class="filter-pills">
                <div class="filter-pill">
                    <select id="movies-filter-genre">
                        <option value="all">Thể loại</option>
                        <option value="Hành Động">Hành Động</option>
                        <option value="Viễn Tưởng">Viễn Tưởng</option>
                        <option value="Kinh Dị">Kinh Dị</option>
                        <option value="Tình Cảm">Tình Cảm</option>
                        <option value="Anime">Anime</option>
                        <option value="Hoạt Hình">Hoạt Hình</option>
                        <option value="Phiêu Lưu">Phiêu Lưu</option>
                        <option value="Hài">Hài</option>
                    </select>
                </div>
                <div class="filter-pill">
                    <select id="movies-filter-format">
                        <option value="all">Định dạng</option>
                        <option value="2D">2D</option>
                        <option value="3D">3D</option>
                        <option value="IMAX">IMAX</option>
                        <option value="4DX">4DX</option>
                    </select>
                </div>
                <div class="filter-pill">
                    <select id="movies-filter-age">
                        <option value="all">Độ tuổi</option>
                        <option value="P">P - Phổ thông</option>
                        <option value="T13">T13</option>
                        <option value="T16">T16</option>
                        <option value="T18">T18</option>
                        <option value="C18">C18</option>
                    </select>
                </div>
            </div>
            <div class="sort-pill">
                <select id="movies-sort">
                    <option value="newest">Sắp xếp: Mới nhất</option>
                    <option value="name-az">Tên: A → Z</option>
                    <option value="name-za">Tên: Z → A</option>
                    <option value="duration">Thời lượng</option>
                </select>
            </div>
        </div>

        <!-- MOVIE GRID -->
        <div class="movies-grid-container">
            <div class="movies-grid" id="movies-grid">
                <!-- Rendered by JS -->
            </div>
        </div>

        <!-- LOAD MORE -->
        <div class="load-more-container" id="load-more-container">
            <button class="btn-load-more" id="btn-load-more">
                Xem thêm <i class="fas fa-chevron-down"></i>
            </button>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script type="module" src="/shared/components/navbar.js"></script>
    <script type="module" src="/shared/components/footer.js"></script>

    <script src="/shared/js/data.js"></script>
    <script src="/shared/js/main.js"></script>
    <script src="/explore/movie-search/movies.js"></script>
</body>
</html>
