<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" type="image/jpeg" href="/assets/favicon.jpg?v=2">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Tìm vị trí các cụm rạp chiếu phim 3HD2K Cinema gần nhất trên bản đồ trực quan. Xem địa chỉ rạp, suất chiếu và hướng dẫn đường đi chi tiết.">
    <!-- Open Graph / Social Media Meta Tags -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Hệ Thống Cụm Rạp Chiếu Phim - 3HD2K Cinema">
    <meta property="og:description" content="Tìm rạp chiếu phim 3HD2K Cinema gần bạn nhất, chỉ đường bản đồ và đặt vé xem phim tiện lợi.">
    <meta property="og:image" content="/assets/favicon.jpg">
    <meta name="robots" content="index, follow">
    <title>3HD2K - Hệ Thống Cụm Rạp & Bản Đồ Chỉ Đường</title>
    <link rel="stylesheet" href="../../shared/css/main.css">
    <link rel="stylesheet" href="../../explore/cinema-map/cinemas.css">
    <!-- Load custom fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@600;700;800;900&family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <!-- Leaflet.js Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- FontAwesome for Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <main class="cinemas-page">
        <div class="cinemas-layout">
            <!-- LEFT: Cinema List -->
            <div class="cinemas-list-panel">
                <div class="cinemas-header">
                    <h1>Rạp chiếu gần đây</h1>
                    <p>Khám phá các phòng chiếu 3HD2K chân thực gần bạn</p>
                </div>
                <div id="cinemas-list">
                    <!-- Rendered by JS -->
                </div>
            </div>

            <!-- RIGHT: Tactical Map -->
            <div class="cinemas-map-panel">
                <!-- HUD Frame -->
                <div class="hud-frame">
                    <span class="hud-corner hud-tl"></span>
                    <span class="hud-corner hud-tr"></span>
                    <span class="hud-corner hud-bl"></span>
                    <span class="hud-corner hud-br"></span>
                </div>

                <!-- Scanline overlay -->
                <div class="hud-scanlines"></div>

                <!-- HUD Top Bar -->
                <div class="hud-top-bar">
                    <span class="map-overlay-brand"><i class="fas fa-film" style="margin-right: 6px;"></i> CINEMAS 3HD2K</span>
                    <span class="hud-coordinates" id="hud-coordinates">COORDINATE: 20.9850° N, 105.8542° E</span>
                </div>

                <!-- Leaflet Map -->
                <div id="leaflet-map"></div>

                <!-- HUD Bottom Bar -->
                <div class="hud-bottom-bar">
                    <div class="hud-bottom-left">
                        <span class="hud-mission">MISSION: FIND YOUR CINEMA</span>
                        <span class="hud-system">SYSTEM <span style="color: var(--primary-red);">ONLINE</span></span>
                    </div>
                    <div class="hud-bottom-right">
                        <div class="hud-legend">
                            <span class="hud-legend-title">LEGEND</span>
                            <div class="hud-legend-item">
                                <span class="hud-legend-marker"></span>
                                <span>3HD2K CINEMA</span>
                            </div>
                        </div>
                        <span class="hud-tracking">TRACKING SYSTEM: <span style="color: var(--primary-red);">ACTIVE</span></span>
                    </div>
                </div>

                <!-- Location button -->
                <button class="btn-my-location" id="btn-my-location" title="Vị trí của tôi">
                    <i class="fas fa-crosshairs"></i>
                </button>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script type="module" src="../../shared/components/navbar.js"></script>
    <script type="module" src="../../shared/components/footer.js"></script>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="../../shared/js/data.js"></script>
    <script src="../../shared/js/main.js"></script>
    <script src="../../explore/cinema-map/cinemas.js"></script>
</body>
</html>
