<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <link rel="icon" type="image/jpeg" href="/assets/favicon.jpg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xác nhận đặt vé - 3HD2K Cinema</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/shared/css/main.css">
  <link rel="stylesheet" href="/shared/css/style.css">
  <link rel="stylesheet" href="/shared/css/tailwind-legacy.css">
  <link rel="stylesheet" href="/booking/css/booking.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- TOPBAR -->
  <div id="navbar-placeholder"></div>

  <main class="booking-page-container" style="padding-top: 6rem;">
    <!-- Hero Banner (Top Full Width) -->
    <div class="booking-card hero-banner-card" style="padding: 0; overflow: hidden; position: relative; border: 1px solid var(--glass-border); min-height: 280px; display: flex; align-items: flex-end;">
      <div id="bs-hero-image" class="hero-image-bg" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; background-image: linear-gradient(to top, rgba(12, 12, 12, 1) 0%, rgba(12, 12, 12, 0.4) 60%, rgba(12, 12, 12, 0.1) 100%); background-color: #111; z-index: 1;"></div>
      <div class="hero-content-overlay" style="position: relative; z-index: 2; padding: 2rem; width: 100%;">
        <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem;">
          <span class="success-badge" style="background: rgba(229, 9, 20, 0.2); color: #ff3b45; padding: 4px 12px; border-radius: 4px; font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.85rem; border: 1px solid rgba(229, 9, 20, 0.4); text-transform: uppercase;">ĐẶT VÉ THÀNH CÔNG</span>
          <span id="bs-points-earned" class="points-badge" style="display: none; background: rgba(255,215,0,0.15); border: 1px solid rgba(255,215,0,0.3); color: #ffd700; padding: 4px 12px; border-radius: 50px; font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 700;">+0 PTS</span>
        </div>
        <h1 id="bs-movie-title" class="movie-title" style="font-family: 'Bebas Neue', sans-serif; font-size: 3.5rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 0.5rem; text-shadow: 0 4px 12px rgba(0,0,0,0.8);">Đang tải...</h1>
        <div id="bs-movie-tags" class="movie-tags" style="display: flex; gap: 10px; font-size: 0.85rem; font-weight: 600;">
          <!-- Tags will be dynamically injected here -->
        </div>
      </div>
    </div>

    <!-- Booking Grid (2 columns for desktop) -->
    <div class="booking-grid booking-grid-checkout">
      <!-- LEFT COLUMN: Ticket Information -->
      <div class="booking-panel">
        <div class="booking-card">
          <h2 class="booking-section-title">Thông Tin Vé</h2>
          
          <div class="info-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div class="grid-item">
              <span class="label" style="display: block; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px;">Rạp</span>
              <span id="bs-room" class="value" style="font-size: 1.1rem; font-weight: 600;">...</span>
            </div>
            <div class="grid-item">
              <span class="label" style="display: block; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px;">Ngày</span>
              <span id="bs-date" class="value" style="font-size: 1.1rem; font-weight: 600;">...</span>
            </div>
            <div class="grid-item">
              <span class="label" style="display: block; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px;">Giờ</span>
              <span id="bs-time" class="value" style="font-size: 1.1rem; font-weight: 600;">...</span>
            </div>
            <div class="grid-item">
              <span class="label" style="display: block; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px;">Chỗ ngồi</span>
              <span id="bs-seats" class="value" style="font-size: 1.1rem; font-weight: 700; color: #ff3b45;">...</span>
            </div>
          </div>

          <div class="btn-group" style="display: flex; gap: 1rem; margin-top: 1.5rem; border-top: 1px solid var(--glass-border); padding-top: 1.5rem;">
            <a href="../../user/user-profile/profile.html?tab=history" class="btn-primary" style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; border-radius: 8px; font-weight: 600; background: var(--primary-red); color: white; transition: all 0.2s;"><i class="fas fa-ticket-alt"></i> XEM VÉ CỦA TÔI</a>
            <button class="btn-outline" style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; border-radius: 8px; font-weight: 600; background: transparent; border: 1px solid rgba(255,255,255,0.2); color: white; transition: all 0.2s;"><i class="fas fa-share-alt"></i> CHIA SẺ</button>
          </div>
        </div>


      </div>

      <!-- RIGHT COLUMN: QR Code -->
      <div class="booking-panel">
        <div class="booking-card" style="align-items: center; text-align: center; padding: 2.5rem 2rem;">
          <h2 class="booking-section-title" style="border: none; text-align: center; margin-bottom: 1.5rem; letter-spacing: 1px;">Mã Quét Vào Rạp</h2>
          
          <div class="qr-wrapper" style="background: white; width: 220px; height: 220px; border-radius: 16px; margin: 0 auto 1.5rem auto; display: flex; justify-content: center; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
            <div id="qrcode-container" style="width: 180px; height: 180px; position: relative; display: flex; justify-content: center; align-items: center;"></div>
          </div>

          <div class="qr-details" style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
            <span class="code-label" style="font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px;">Mã đặt vé</span>
            <span id="bs-ticket-code" class="code-value" style="font-family: 'Oswald', sans-serif; font-size: 2rem; font-weight: 700; color: white; letter-spacing: 1px;">...</span>
            <p class="qr-hint" style="font-size: 0.85rem; color: var(--text-muted); margin-top: 8px;">Vui lòng xuất trình mã QR này cho nhân viên khi vào rạp.</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <div id="footer-placeholder"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="/shared/js/data.js"></script>
  <script type="module" src="/shared/components/navbar.js"></script>
  <script type="module" src="/shared/components/footer.js"></script>
  <script type="module" src="/shared/js/main.js"></script>
  <script type="module" src="./booking-success.js"></script>
  
  <style>
    /* Custom button hover styles for booking-success */
    .btn-primary:hover {
      background: #cc0812;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(229, 9, 20, 0.3);
    }
    .btn-outline:hover {
      background: rgba(255,255,255,0.1);
      transform: translateY(-2px);
    }
    .upsell-item:hover {
      border-color: rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
    }
    .upsell-item button:hover {
      background: rgba(229, 9, 20, 0.8);
    }
  </style>
</body>
</html>
