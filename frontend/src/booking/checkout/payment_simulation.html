<!DOCTYPE html>
<html class="dark" lang="vi">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Mô phỏng thanh toán - 3HD2K Cinema</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="../../shared/css/main.css">
    <link rel="stylesheet" href="../../shared/css/style.css">
    <link rel="stylesheet" href="../../shared/css/tailwind-legacy.css">
    
    <style>
        .sim-container {
            max-width: 400px;
            margin: 4rem auto;
            background: white;
            color: #111;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .sim-header {
            background: #ae2070; /* Momo color by default */
            color: white;
            padding: 1.5rem;
            text-align: center;
        }

        .sim-header.vnpay {
            background: #005baa;
        }

        .sim-header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }

        .sim-body {
            padding: 2rem 1.5rem;
            text-align: center;
        }

        .sim-amount {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 1rem 0;
            color: #ae2070;
        }
        
        .sim-amount.vnpay {
            color: #005baa;
        }

        .sim-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #ae2070;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }

        .sim-spinner.vnpay {
            border-top-color: #005baa;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .sim-btn {
            display: block;
            width: 100%;
            padding: 1rem;
            background: #ae2070;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 2rem;
            transition: opacity 0.2s;
        }

        .sim-btn.vnpay {
            background: #005baa;
        }

        .sim-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body style="background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); height: 100vh; display: flex; align-items: center; justify-content: center;">

    <div class="sim-container" id="sim-container">
        <div class="sim-header" id="sim-header">
            <h1 id="gateway-name">Cổng Thanh Toán</h1>
        </div>
        <div class="sim-body">
            <div style="background: #f8f9fa; padding: 1rem; border-radius: 12px; display: inline-block; margin-bottom: 1.5rem; border: 1px solid #e9ecef; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
                <img id="qr-code-img" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=3HD2K-Cinema-Simulation" alt="QR Code" style="width: 180px; height: 180px; display: block;">
            </div>
            
            <p style="color: #666; font-size: 0.875rem; margin-bottom: 0.5rem;">Dùng ứng dụng để quét mã QR</p>
            
            <div class="sim-amount" id="sim-amount" style="margin-top: 0.5rem; margin-bottom: 0;">0 đ</div>
            <p style="font-weight: 600; font-size: 1rem; color: #333; margin-top: 0.25rem; margin-bottom: 1.5rem;">3HD2K Cinema</p>
            
            <div style="display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-bottom: 1rem; background: #f8f9fa; padding: 0.5rem; border-radius: 8px;">
                <div class="sim-spinner" id="sim-spinner" style="margin: 0; width: 16px; height: 16px; border-width: 2px;"></div>
                <span style="font-size: 0.85rem; color: #666;">Đang chờ thanh toán... <strong class="countdown-warning" style="color: #e50914;">05:00</strong></span>
            </div>
            
            <button class="sim-btn" id="sim-btn" disabled>XÁC NHẬN ĐÃ QUÉT MÃ</button>
        </div>
    </div>

    <script type="module" src="./payment.js"></script>
</body>
</html>
