<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chia Sẻ Thanh Toán | CGV Cinemas</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../../shared/css/variables.css">
    <link rel="stylesheet" href="../../shared/css/global.css">
    <link rel="stylesheet" href="../css/booking.css">
    <link rel="stylesheet" href="../css/checkout.css">
    <style>
        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, rgba(229, 9, 20, 0.15) 0%, transparent 50%),
                              radial-gradient(circle at 100% 100%, rgba(20, 20, 20, 0.8) 0%, transparent 50%);
            background-attachment: fixed;
        }

        .split-container {
            max-width: 700px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }
        .header-title {
            font-family: 'Oswald', sans-serif;
            text-align: center;
            font-size: 2.5rem;
            color: #fff;
            margin-bottom: 0.25rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(229,9,20,0.5);
        }
        .glass-panel {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .progress-bar-container {
            width: 100%;
            height: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 0.5rem;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #e50914, #ff4b4b);
            width: 0%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px rgba(229,9,20,0.8);
        }
        .split-seat-card {
            background: linear-gradient(145deg, rgba(30,30,30,0.8), rgba(15,15,15,0.9));
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 1.5rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
        }
        .split-seat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: rgba(255,255,255,0.1);
        }
        .split-seat-card:hover:not(.paid) {
            transform: translateY(-5px);
            background: linear-gradient(145deg, rgba(229,9,20,0.2), rgba(15,15,15,0.9));
            border-color: rgba(229,9,20,0.5);
            box-shadow: 0 10px 20px rgba(229,9,20,0.2);
        }
        .split-seat-card.selected {
            background: linear-gradient(145deg, rgba(229,9,20,0.8), rgba(229,9,20,0.4));
            border-color: #ff4b4b;
            box-shadow: 0 0 20px rgba(229,9,20,0.5);
            transform: scale(1.05);
        }
        .split-seat-card.paid {
            background: linear-gradient(145deg, rgba(16, 185, 129, 0.2), rgba(15,15,15,0.9));
            border-color: #10b981;
            cursor: not-allowed;
        }
        .split-seat-card.paid::before {
            background: #10b981;
        }
        .split-seat-id {
            font-size: 1.5rem;
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 1px;
            margin-bottom: 0.25rem;
        }
        .paid-badge {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
            border: 1px solid #10b981;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.3);
        }
        .timer-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(229, 9, 20, 0.1);
            border: 1px solid rgba(229, 9, 20, 0.3);
            color: #ff4b4b;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: 700;
            font-family: 'Inter', monospace;
            box-shadow: 0 0 15px rgba(229,9,20,0.2);
        }

        .split-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }
        .header-title {
            font-family: 'Oswald', sans-serif;
            text-align: center;
            font-size: 2rem;
            color: var(--primary-red);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }
        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }
        .movie-info-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1rem;
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .movie-poster {
            width: 80px;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .movie-details h3 {
            margin: 0 0 0.5rem 0;
            font-size: 1.25rem;
        }
        .movie-details p {
            margin: 0 0 0.25rem 0;
            color: var(--text-muted);
            font-size: 0.875rem;
        }
        
        /* Seat Grid */
        .split-seat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }
        .split-seat-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .split-seat-card:hover:not(.paid) {
            background: rgba(229, 9, 20, 0.1);
            border-color: var(--primary-red);
        }
        .split-seat-card.selected {
            background: rgba(229, 9, 20, 0.2);
            border-color: var(--primary-red);
            box-shadow: 0 0 15px rgba(229,9,20,0.4);
        }
        .split-seat-card.paid {
            background: rgba(16, 185, 129, 0.1);
            border-color: #10b981;
            cursor: not-allowed;
            opacity: 0.8;
        }
        .split-seat-id {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .split-seat-price {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .paid-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #10b981;
            color: #fff;
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: bold;
        }
        
        
        
        /* Enhanced Confirm Button */
        .btn-confirm-enhanced {
            width: 100%;
            margin-top: 1.5rem;
            padding: 1.25rem !important;
            font-size: 1.2rem !important;
            font-weight: 700;
            font-family: 'Oswald', sans-serif;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #e50914, #ff4b4b, #e50914) !important;
            background-size: 200% auto !important;
            border: none !important;
            border-radius: 8px !important;
            color: white;
            cursor: pointer;
            transition: all 0.5s ease;
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            animation: gradient-shift 3s linear infinite;
        }

        .btn-confirm-enhanced:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(229, 9, 20, 0.8);
            background-position: right center !important;
        }

        .btn-confirm-enhanced i {
            font-size: 1.1rem;
        }

        @keyframes gradient-shift {
            0% { background-position: 0% center; }
            100% { background-position: -200% center; }
        }

/* Add-ons Enhanced */
        .addon-section {
            margin-top: 2.5rem;
            background: linear-gradient(135deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }
        .addon-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem;
            margin-top: 1rem;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.03);
            transition: all 0.3s ease;
        }
        .addon-item:hover {
            background: rgba(255,255,255,0.05);
            transform: translateX(5px);
            border-color: rgba(229,9,20,0.3);
        }
        .btn-addon {
            padding: 0.5rem 1.25rem !important;
            border-radius: 30px !important;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .addon-section {
            margin-top: 2rem;
            background: rgba(255,255,255,0.02);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px dashed rgba(255,255,255,0.1);
        }
        .addon-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .addon-item:last-child {
            border-bottom: none;
        }
        
        /* Total Section */
        .total-section {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .total-price {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--primary-red);
        }
        
        /* Progress */
        .progress-bar-container {
            width: 100%;
            height: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 0.5rem;
        }
        .progress-bar-fill {
            height: 100%;
            background: var(--primary-red);
            width: 0%;
            transition: width 0.3s ease;
        }
        .progress-text {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="split-container" id="split-app">
        <!-- Will be populated by JS -->
        <div style="text-align:center; padding: 3rem;">
            <i class="fas fa-spinner fa-spin fa-2x"></i>
            <p>Đang tải dữ liệu đơn hàng...</p>
        </div>
    </div>

    <!-- Payment Provider Selection Modal -->
    <div id="payment-modal" class="modal-backdrop" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(5px);">
        <div class="glass-panel" style="width: 90%; max-width: 400px; padding: 2rem; position: relative; border: 1px solid rgba(255,255,255,0.2); border-radius: 12px;">
            <i class="fas fa-times" id="close-payment-modal" style="position: absolute; top: 1rem; right: 1rem; cursor: pointer; font-size: 1.25rem;"></i>
            <h3 style="margin-top: 0; text-align: center; font-family: 'Oswald'; font-size: 1.5rem;">Chọn Cổng Thanh Toán</h3>
            
            <div style="display: flex; flex-direction: column; gap: 1rem; margin-top: 1.5rem;">
                <label class="payment-card selected-momo" style="display: flex; align-items: center; justify-content: space-between; padding: 1rem; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; cursor: pointer;">
                    <div style="display: flex; align-items: center; gap: 1rem;">
                        <input type="radio" name="payment-method" value="momo" checked style="display: none;">
                        <img src="https://img.mservice.io/momo-payment/icon/images/logo512.png" alt="MoMo" style="height: 30px; object-fit: contain;">
                        <span>Ví MoMo</span>
                    </div>
                </label>
                <label class="payment-card" style="display: flex; align-items: center; justify-content: space-between; padding: 1rem; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; cursor: pointer;">
                    <div style="display: flex; align-items: center; gap: 1rem;">
                        <input type="radio" name="payment-method" value="vnpay" style="display: none;">
                        <img src="https://cdn.haitrieu.com/wp-content/uploads/2022/10/Logo-VNPAY-QR-1.png" alt="VNPay" style="height: 30px; object-fit: contain;">
                        <span>VNPAY</span>
                    </div>
                </label>
            </div>
            
            <button id="btn-confirm-pay" class="btn-confirm-enhanced"><i class="fas fa-shield-alt"></i> XÁC NHẬN THANH TOÁN</button>
        </div>
    </div>

    <script type="module" src="split-pay.js"></script>
</body>
</html>
