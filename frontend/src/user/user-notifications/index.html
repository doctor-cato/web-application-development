<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" type="image/jpeg" href="/assets/favicon.jpg?v=2">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3HD2K - Quản lý thông báo</title>
    <link rel="stylesheet" href="../../shared/css/main.css">
    <link rel="stylesheet" href="../../user/user-notifications/notifications.css">
    <!-- Load custom fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@600;700;800;900&family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- NAVBAR -->
    <div id="navbar-placeholder"></div>

    <main class="notif-page">
        <div class="notif-container">
            <div class="notif-page-header">
                <h1 class="notif-page-title">Quản lý thông báo</h1>
                <div class="notif-page-actions">
                    <button id="notif-page-mark-all"><i class="fas fa-check-double"></i> Đánh dấu tất cả đã đọc</button>
                </div>
            </div>

            <div class="notif-layout">
                <!-- Sidebar -->
                <aside class="notif-sidebar">
                    <button class="notif-filter-btn active" data-filter="all">
                        <span><i class="fas fa-inbox"></i> Tất cả</span>
                    </button>
                    <button class="notif-filter-btn" data-filter="unread">
                        <span><i class="fas fa-envelope"></i> Chưa đọc</span>
                        <span class="badge">2</span>
                    </button>
                    <button class="notif-filter-btn" data-filter="booking">
                        <span><i class="fas fa-ticket-alt"></i> Vé đã đặt</span>
                    </button>
                    <button class="notif-filter-btn" data-filter="promo">
                        <span><i class="fas fa-tag"></i> Khuyến mãi</span>
                    </button>
                    <button class="notif-filter-btn" data-filter="movie">
                        <span><i class="fas fa-film"></i> Tin tức phim</span>
                    </button>
                </aside>

                <!-- Main Feed -->
                <div class="notif-feed">
                    <div class="notif-empty" id="notif-empty" style="display: none;">
                        <i class="far fa-bell-slash"></i>
                        <p>Không có thông báo nào ở đây.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="../../shared/js/main.js"></script>
    <script src="../../user/user-notifications/notifications.js"></script>
    <script type="module" src="../../shared/components/navbar.js"></script>
    <script type="module" src="../../shared/components/footer.js"></script>
</body>
</html>
