site_name: 3HD2Kcinema Documentation
site_description: Tài liệu kỹ thuật chi tiết hệ thống đặt vé rạp chiếu phim 3HD2Kcinema
site_author: 3HD2Kcinema Team
site_url: https://github.com/doctor-cato/web-application-development

theme:
  name: material
  language: vi
  palette:
    # Palette toggle for dark mode (Cinematic Noir)
    - scheme: slate
      primary: black
      accent: red
      toggle:
        icon: material/weather-night
        name: Chuyển sang chế độ Sáng
    # Palette toggle for light mode
    - scheme: default
      primary: indigo
      accent: red
      toggle:
        icon: material/weather-sunny
        name: Chuyển sang chế độ Tối
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - def_list
  - footnotes

nav:
  - "Tổng quan": index.md
  - "Bắt đầu": getting-started.md
  - "Kiến trúc": architecture.md
  - "Frontend": frontend.md
  - "Backend": backend.md
  - "API": api.md
  - "Cơ sở dữ liệu": database.md
  - "Triển khai": deployment.md
  - "Kiểm thử": testing.md
  - "Quy trình đóng góp": contributing.md
  - "AI Agent Guide": ai-contribution.md
