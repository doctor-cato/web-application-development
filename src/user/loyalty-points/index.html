<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3HD2K Rewards</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  
  <link rel="stylesheet" href="/shared/css/style.css">
  <link rel="stylesheet" href="/booking/css/booking.css">
  <link rel="stylesheet" href="/user/loyalty-points/loyalty.css">
  <script src="/user/loyalty-points/js/app.js" defer></script>
</head>

<body>
  
  <div id="navbar-placeholder"></div>

  <main class="booking-page-container">
    <div class="checkout-header" style="text-align: center;">
      <h1>3HD2K Rewards</h1>
      <p>Tích điểm đổi quà, nhận vô vàn ưu đãi</p>
    </div>

    <div class="booking-grid">
      
      <!-- LEFT COLUMN -->
      <div class="booking-panel">
        
        <!-- CARD -->
        <article class="glass-panel booking-card rewards-card" style="background: linear-gradient(135deg, #1a1a1a, #0d0d0d); min-height: 250px; display: flex; flex-direction: column; justify-content: center; position: relative; overflow: hidden;">
          <div style="position: absolute; top: -50px; right: -50px; width: 200px; height: 200px; background: rgba(229,9,20,0.1); border-radius: 50%; filter: blur(50px);"></div>
          
          <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2rem;">
            <div>
              <div style="font-family: 'Bebas Neue'; color: var(--text-muted); letter-spacing: 2px;">THÀNH VIÊN</div>
              <div class="points" style="font-size: 4rem; font-weight: 800; font-family: 'Bebas Neue'; color: white; line-height: 1;">
                0 <span style="font-size: 1.5rem; color: var(--primary-red);">PTS</span>
              </div>
            </div>
            <img src="/shared/assets/images/logo.png" alt="Logo" style="height: 40px; opacity: 0.8;" onerror="this.style.display='none'">
          </div>

          <div style="background: rgba(255,255,255,0.1); height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 0.5rem;">
            <div class="progress-fill" style="width: 0%; height: 100%; background: var(--primary-red); transition: width 0.5s;"></div>
          </div>
          
          <div style="display: flex; justify-content: space-between; font-size: 0.875rem; color: var(--text-muted);">
            <span>Thành Viên</span>
            <span>Bạc (200 PTS)</span>
          </div>
        </article>

        <!-- PRIVILEGES -->
        <div class="glass-panel booking-card">
          <h2 class="booking-section-title">Đặc Quyền Thành Viên</h2>
          <ul style="list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 1rem;">
            <li style="display: flex; align-items: center; gap: 0.75rem;">
              <i class="fas fa-check-circle" style="color: var(--primary-red);"></i>
              <span>Tích lũy 10% điểm thưởng cho mỗi giao dịch</span>
            </li>
            <li style="display: flex; align-items: center; gap: 0.75rem;">
              <i class="fas fa-check-circle" style="color: var(--primary-red);"></i>
              <span>Đổi quà tặng độc quyền</span>
            </li>
            <li style="display: flex; align-items: center; gap: 0.75rem;">
              <i class="fas fa-check-circle" style="color: var(--primary-red);"></i>
              <span>Nhận thông báo khuyến mãi sớm nhất</span>
            </li>
          </ul>
        </div>

      </div>

      <!-- RIGHT COLUMN: GIFTS -->
      <div class="booking-panel">
        
        <div class="glass-panel booking-card">
          <h2 class="booking-section-title">Đổi Quà Tặng</h2>
          
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <!-- Gift 1 -->
            <div style="background: var(--surface-variant); border-radius: 12px; overflow: hidden;">
              <div style="height: 120px; background: url('https://images.unsplash.com/photo-1578849278619-e73505e9610f?w=480&h=280&fit=crop') center/cover;"></div>
              <div style="padding: 1rem;">
                <h3 style="font-weight: bold; margin-bottom: 0.5rem; font-size: 1.125rem;">Bắp Nước Miễn Phí</h3>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                  <span style="color: var(--primary-red); font-weight: bold;">500 PTS</span>
                  <button class="btn btn-primary" style="padding: 0.25rem 0.75rem; font-size: 0.75rem;">Đổi</button>
                </div>
              </div>
            </div>

            <!-- Gift 2 -->
            <div style="background: var(--surface-variant); border-radius: 12px; overflow: hidden;">
              <div style="height: 120px; background: url('https://images.unsplash.com/photo-1607083206869-4c7672f72a8a?w=480&h=280&fit=crop') center/cover;"></div>
              <div style="padding: 1rem;">
                <h3 style="font-weight: bold; margin-bottom: 0.5rem; font-size: 1.125rem;">Voucher 50K</h3>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                  <span style="color: var(--primary-red); font-weight: bold;">800 PTS</span>
                  <button class="btn btn-primary" style="padding: 0.25rem 0.75rem; font-size: 0.75rem;">Đổi</button>
                </div>
              </div>
            </div>
          </div>
        </div>

      </div>

    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script type="module" src="/shared/components/navbar.js"></script>
  <script type="module" src="/shared/components/footer.js"></script>

</body>
</html>
