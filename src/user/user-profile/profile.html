<!DOCTYPE html>
<html class="dark" lang="vi">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Thông tin cá nhân - 3HD2K Cinema</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../../shared/css/style.css">

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-container": "#e50914",
                        "background": "#121414",
                        "surface-variant": "#343535",
                        "secondary": "#c8c6c5",
                        "surface-container-low": "#1a1c1c",
                        "surface-container-lowest": "#0d0e0f"
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background antialiased text-white min-h-screen flex flex-col font-['Inter']">

    <header class="w-full z-50 px-8 h-20 flex items-center justify-between border-b border-surface-variant bg-surface-container-low">
        <a class="font-['Bebas_Neue'] text-[48px] text-primary-container font-bold tracking-tighter" href="../../explore/home-page/index.html">3HD2K</a>
        <a class="text-sm font-semibold hover:text-primary-container transition" href="../../auth/user-login/login.html">Đăng xuất</a>
    </header>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="w-full max-w-[500px] bg-surface-container-low p-8 rounded-xl border border-surface-variant shadow-2xl space-y-6">
            
            <div class="text-center border-b border-surface-variant pb-4 space-y-3">
                <div class="avatar-container">
                    <img id="profileAvatar" class="avatar-preview" src="https://api.dicebear.com/7.x/bottts/svg?seed=3HD2K" alt="Avatar">
                    <label for="changeAvatarInput" class="avatar-upload-btn">
                        <span class="material-symbols-outlined">edit</span>
                    </label>
                    <input type="file" id="changeAvatarInput" accept="image/*" class="hidden">
                </div>
                <h2 class="font-['Bebas_Neue'] text-3xl tracking-wide mt-2">Thông Tin Tài Khoản</h2>
            </div>

            <div class="space-y-4 text-sm">
                <div class="flex justify-between items-center py-2 border-b border-background">
                    <span class="text-secondary font-medium">Họ và tên:</span>
                    <span id="view-fullname" class="font-semibold text-white">Chưa cập nhật</span>
                </div>

                <div class="flex justify-between items-center py-2 border-b border-background">
                    <span class="text-secondary font-medium">Ngày sinh:</span>
                    <span id="view-dob" class="font-semibold text-white">Chưa cập nhật</span>
                </div>

                <div class="flex justify-between items-center py-2 border-b border-background">
                    <span class="text-secondary font-medium">Email liên hệ:</span>
                    <span id="view-email" class="font-semibold text-white text-right break-all">Chưa cập nhật</span>
                </div>

                <div class="flex justify-between items-center py-2">
                    <span class="text-secondary font-medium">Số điện thoại:</span>
                    <span id="view-phone" class="font-semibold text-white">Chưa cập nhật</span>
                </div>
            </div>

            <div class="pt-2">
                <a href="../../explore/home-page/index.html" class="block w-full text-center bg-surface-variant text-white py-2.5 rounded-lg font-medium hover:bg-gray-600 transition text-xs uppercase tracking-wider">
                    Quay lại trang chủ
                </a>
            </div>
        </div>
    </main>

    <footer class="bg-surface-container-lowest text-white border-t border-surface-variant px-8 py-4 flex flex-col md:flex-row justify-between items-center text-xs">
        <span class="font-['Bebas_Neue'] text-xl tracking-tighter text-primary-container">3HD2K</span>
        <div class="text-secondary mt-2 md:mt-0">© 2026 3HD2K Cinema. All rights reserved.</div>
    </footer>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            // 1. Phân tích tham số chữ nhận được từ URL của form Đăng ký
            const urlParams = new URLSearchParams(window.location.search);
            const fullname = urlParams.get('fullname');
            const dob = urlParams.get('dob');
            const email = urlParams.get('email');
            const phone = urlParams.get('phone');

            if (fullname) document.getElementById('view-fullname').innerText = fullname;
            if (email) document.getElementById('view-email').innerText = email;
            if (phone) document.getElementById('view-phone').innerText = phone;
            
            if (dob) {
                // Đổi định dạng từ YYYY-MM-DD sang DD/MM/YYYY
                const dateParts = dob.split('-');
                if(dateParts.length === 3) {
                    document.getElementById('view-dob').innerText = `${dateParts[2]}/${dateParts[1]}/${dateParts[0]}`;
                } else {
                    document.getElementById('view-dob').innerText = dob;
                }
            }

            // 2. Kiểm tra bộ nhớ đệm xem có ảnh được đẩy từ bên đăng ký sang không
            const savedAvatar = localStorage.getItem('user_avatar');
            if (savedAvatar) {
                document.getElementById('profileAvatar').src = savedAvatar;
            }
        });

        // 3. Xử lý cho phép thay đổi ảnh đại diện trực tiếp ngay tại trang Profile
        document.getElementById('changeAvatarInput').addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('profileAvatar').src = e.target.result;
                    // Cập nhật đè ảnh mới vào LocalStorage
                    localStorage.setItem('user_avatar', e.target.result);
                }
                reader.readAsDataURL(file);
            }
        });
    </script>
    <script type="module" src="profile.js"></script>
</body>
</html>
