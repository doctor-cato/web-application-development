<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3HD2K - Khám phá phim</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;900&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Outfit', 'sans-serif'],
                        body: ['Geist', 'sans-serif'],
                    },
                    colors: {
                        base: '#09090b',
                        surface: '#18181b',
                        'surface-high': '#27272a',
                        accent: '#be123c',
                        'accent-hover': '#9f1239',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Geist', sans-serif; background-color: #09090b; color: #fafafa; }
        h1, h2, h3, h4, .font-display { font-family: 'Outfit', sans-serif; }
        *:focus-visible { outline: 2px solid #be123c; outline-offset: 2px; }
        .liquid-glass { background: rgba(24, 24, 27, 0.4); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: inset 0 1px 0 rgba(255,255,255,0.1); }
        .hover-lift { transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .hover-lift:hover { transform: translateY(-4px) scale(1.01); box-shadow: 0 20px 40px -15px rgba(0,0,0,0.5); }
        .noise-bg::before { content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 50; opacity: 0.03; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E"); }
    </style>
</head>
<body class="antialiased min-h-[100dvh] flex flex-col relative noise-bg">
    
    <!-- NAVIGATION -->
    <header class="fixed top-0 w-full z-40 liquid-glass border-b border-white/5 h-20 flex items-center justify-between px-6 md:px-12">
        <div class="flex items-center gap-12">
            <a href="../home-page/index.html" class="font-display font-black text-3xl tracking-tighter text-white hover:text-accent transition-colors" aria-label="3HD2K Home">3HD2K</a>
            <nav class="hidden md:flex gap-8">
                <a href="../home-page/index.html" class="text-sm font-medium text-zinc-400 hover:text-white transition-colors">Trang chủ</a>
                <a href="index.html" class="text-sm font-medium text-white border-b border-accent pb-1">Phim đang chiếu</a>
                <a href="../cinema-map/index.html" class="text-sm font-medium text-zinc-400 hover:text-white transition-colors">Cụm rạp</a>
                <a href="../../engagement/dating/index.html" class="text-sm font-medium text-zinc-400 hover:text-white transition-colors">Cine-Match</a>
            </nav>
        </div>
        <div class="flex items-center gap-4">
            <button class="w-10 h-10 rounded-full bg-surface-high flex items-center justify-center hover:bg-zinc-700 transition-colors" aria-label="Search movies">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            </button>
            <button class="w-10 h-10 rounded-full bg-surface-high flex items-center justify-center hover:bg-zinc-700 transition-colors" aria-label="User profile">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </button>
        </div>
    </header>

    <main class="flex-grow pt-32 pb-24 px-6 md:px-12 max-w-[1600px] mx-auto w-full">
        <!-- HEADER & TABS -->
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-8 mb-12">
            <div>
                <h1 class="text-5xl md:text-7xl font-display font-black tracking-tighter mb-4">KHÁM PHÁ</h1>
                <div class="flex gap-6 border-b border-white/10 w-max">
                    <button id="tab-now-showing" class="text-lg font-display font-bold pb-2 border-b-2 border-accent text-white" aria-selected="true">Đang Chiếu</button>
                    <button id="tab-coming-soon" class="text-lg font-display font-bold pb-2 border-b-2 border-transparent text-zinc-500 hover:text-zinc-300 transition-colors" aria-selected="false">Sắp Chiếu</button>
                </div>
            </div>
        </div>

        <!-- FILTERS (Accessible) -->
        <div class="flex flex-wrap gap-4 mb-12 bg-surface p-4 rounded-3xl border border-white/5">
            <label class="sr-only" for="movies-filter-genre">Thể loại</label>
            <select id="movies-filter-genre" class="bg-surface-high border-none text-sm text-white rounded-full px-6 py-3 focus:ring-accent w-full md:w-auto cursor-pointer">
                <option value="all">Tất cả thể loại</option>
                <option value="action">Hành Động</option>
                <option value="scifi">Viễn Tưởng</option>
                <option value="horror">Kinh Dị</option>
                <option value="romance">Tình Cảm</option>
            </select>

            <label class="sr-only" for="movies-filter-format">Định dạng</label>
            <select id="movies-filter-format" class="bg-surface-high border-none text-sm text-white rounded-full px-6 py-3 focus:ring-accent w-full md:w-auto cursor-pointer">
                <option value="all">Mọi định dạng</option>
                <option value="2d">2D</option>
                <option value="3d">3D</option>
                <option value="imax">IMAX</option>
            </select>

            <label class="sr-only" for="movies-filter-age">Độ tuổi</label>
            <select id="movies-filter-age" class="bg-surface-high border-none text-sm text-white rounded-full px-6 py-3 focus:ring-accent w-full md:w-auto cursor-pointer">
                <option value="all">Mọi độ tuổi</option>
                <option value="p">Phổ thông</option>
                <option value="t13">T13</option>
                <option value="t16">T16</option>
                <option value="t18">T18</option>
            </select>
            
            <div class="flex-grow"></div>
            
            <label class="sr-only" for="movies-sort">Sắp xếp</label>
            <select id="movies-sort" class="bg-base border border-white/10 text-sm text-white rounded-full px-6 py-3 focus:ring-accent w-full md:w-auto cursor-pointer">
                <option value="newest">Mới nhất</option>
                <option value="name-az">Tên A-Z</option>
                <option value="name-za">Tên Z-A</option>
            </select>
        </div>

        <!-- MOVIE GRID -->
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6" id="movies-grid">
            <!-- Rendered via JS normally, but providing some static high-end placeholders -->
            <article class="hover-lift relative group rounded-[2rem] overflow-hidden bg-surface border border-white/5 aspect-[2/3]">
                <img src="https://images.unsplash.com/photo-1505635552518-3448ff116af3?auto=format&fit=crop&w=400&q=80" alt="Ác Quỷ Ma Sơ II Poster" class="w-full h-full object-cover opacity-80 group-hover:scale-105 transition-transform duration-700" loading="lazy">
                <div class="absolute inset-0 bg-gradient-to-t from-base via-base/60 to-transparent"></div>
                <div class="absolute bottom-0 left-0 p-6 w-full flex flex-col justify-end h-full">
                    <span class="inline-block self-start py-1 px-3 bg-accent text-white text-[10px] font-bold rounded mb-2">T18</span>
                    <h3 class="text-2xl font-display font-bold text-white mb-2 leading-tight">Ác Quỷ Ma Sơ II</h3>
                    <div class="flex flex-wrap gap-2 mb-6">
                        <span class="text-xs text-zinc-400 border border-zinc-700 px-2 py-1 rounded-md">2D</span>
                        <span class="text-xs text-zinc-400 border border-zinc-700 px-2 py-1 rounded-md">IMAX</span>
                    </div>
                    <button class="w-full inline-flex justify-center items-center bg-white text-black px-4 py-3 rounded-full text-sm font-semibold hover:bg-zinc-200 transition-colors">Mua vé</button>
                </div>
            </article>
            
            <!-- Skeleton Loader (for layout demo) -->
            <article class="relative rounded-[2rem] overflow-hidden bg-surface border border-white/5 aspect-[2/3] animate-pulse">
                <div class="w-full h-full bg-surface-high"></div>
            </article>
            <article class="relative rounded-[2rem] overflow-hidden bg-surface border border-white/5 aspect-[2/3] animate-pulse">
                <div class="w-full h-full bg-surface-high"></div>
            </article>
            <article class="relative rounded-[2rem] overflow-hidden bg-surface border border-white/5 aspect-[2/3] animate-pulse">
                <div class="w-full h-full bg-surface-high"></div>
            </article>
            <article class="relative rounded-[2rem] overflow-hidden bg-surface border border-white/5 aspect-[2/3] animate-pulse">
                <div class="w-full h-full bg-surface-high"></div>
            </article>
        </div>

        <div class="mt-16 text-center">
            <button id="btn-load-more" class="inline-flex items-center justify-center border border-white/20 text-white px-8 py-3 rounded-full text-sm font-medium hover:bg-white/5 transition-colors">
                Xem thêm
            </button>
        </div>
    </main>

    <!-- MINIMAL FOOTER -->
    <footer class="border-t border-white/5 bg-base py-12 px-6 md:px-12">
        <div class="max-w-[1600px] mx-auto flex flex-col md:flex-row justify-between items-start md:items-center gap-8">
            <div>
                <a href="../home-page/index.html" class="font-display font-black text-2xl tracking-tighter text-white">3HD2K</a>
                <p class="text-sm text-zinc-500 mt-2">Đẳng cấp điện ảnh. Trải nghiệm khác biệt.</p>
            </div>
            <nav class="flex flex-wrap gap-6 text-sm font-medium text-zinc-400">
                <a href="#" class="hover:text-white transition-colors">Điều khoản</a>
                <a href="#" class="hover:text-white transition-colors">Bảo mật</a>
                <a href="#" class="hover:text-white transition-colors">Tuyển dụng</a>
                <a href="#" class="hover:text-white transition-colors">Liên hệ</a>
            </nav>
        </div>
    </footer>

    <script src="../../shared/js/data.js"></script>
    <script src="../../shared/js/main.js"></script>
    <script src="js/movies.js"></script>
</body>
</html>
