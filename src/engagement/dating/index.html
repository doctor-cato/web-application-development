<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3HD2K - Cine-Match</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;900&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Outfit', 'sans-serif'],
                        body: ['Geist', 'sans-serif'],
                    },
                    colors: {
                        base: '#09090b',
                        surface: '#18181b',
                        'surface-high': '#27272a',
                        accent: '#be123c',
                        'accent-hover': '#9f1239',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Geist', sans-serif; background-color: #09090b; color: #fafafa; }
        h1, h2, h3, h4, .font-display { font-family: 'Outfit', sans-serif; }
        *:focus-visible { outline: 2px solid #be123c; outline-offset: 2px; }
        
        .noise-bg::before { content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 50; opacity: 0.03; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E"); }
        
        .liquid-glass { background: rgba(24, 24, 27, 0.4); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: inset 0 1px 0 rgba(255,255,255,0.1); }
        .hover-lift { transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .hover-lift:hover { transform: translateY(-4px) scale(1.01); box-shadow: 0 20px 40px -15px rgba(0,0,0,0.5); }
        
        /* Tinder swipe stack approximation for CSS */
        .card-stack-1 { z-index: 30; transform: translateY(0) scale(1); }
        .card-stack-2 { z-index: 20; transform: translateY(20px) scale(0.95); opacity: 0.8; }
        .card-stack-3 { z-index: 10; transform: translateY(40px) scale(0.9); opacity: 0.5; }
    </style>
</head>
<body class="antialiased min-h-[100dvh] flex flex-col relative noise-bg overflow-x-hidden">
    
    <!-- NAVIGATION -->
    <header class="fixed top-0 w-full z-40 liquid-glass border-b border-white/5 h-20 flex items-center justify-between px-6 md:px-12">
        <div class="flex items-center gap-12">
            <a href="../../explore/home-page/index.html" class="font-display font-black text-3xl tracking-tighter text-white hover:text-accent transition-colors" aria-label="3HD2K Home">3HD2K</a>
            <nav class="hidden md:flex gap-8">
                <a href="../../explore/home-page/index.html" class="text-sm font-medium text-zinc-400 hover:text-white transition-colors">Trang chủ</a>
                <a href="../../explore/movie-search/index.html" class="text-sm font-medium text-zinc-400 hover:text-white transition-colors">Phim</a>
                <a href="../../explore/cinema-map/index.html" class="text-sm font-medium text-zinc-400 hover:text-white transition-colors">Rạp</a>
                <a href="index.html" class="text-sm font-medium text-white border-b border-accent pb-1">Cine-Match</a>
            </nav>
        </div>
        <div class="flex items-center gap-4">
            <button class="w-10 h-10 rounded-full bg-surface-high flex items-center justify-center hover:bg-zinc-700 transition-colors" aria-label="User profile">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </button>
        </div>
    </header>

    <!-- MAIN LANDING HERO -->
    <main class="flex-grow pt-20 relative flex items-center justify-center min-h-[100dvh]">
        <!-- Blurred Background -->
        <div class="absolute inset-0 z-0 overflow-hidden">
            <div class="absolute -top-1/4 -right-1/4 w-[800px] h-[800px] bg-accent/20 rounded-full blur-[120px]"></div>
            <div class="absolute -bottom-1/4 -left-1/4 w-[600px] h-[600px] bg-purple-900/20 rounded-full blur-[100px]"></div>
        </div>

        <div class="relative z-10 w-full max-w-6xl mx-auto px-6 grid grid-cols-1 md:grid-cols-2 gap-16 items-center">
            
            <!-- Left Text -->
            <div>
                <span class="inline-block py-1 px-3 bg-accent/10 text-accent text-xs font-bold tracking-widest uppercase rounded-full mb-6 border border-accent/20">Kết Nối Điện Ảnh</span>
                <h1 class="text-6xl md:text-8xl font-display font-black tracking-tighter leading-[0.9] text-white mb-6">
                    TÌM <br> TRI KỶ <br> <span class="text-accent">XEM PHIM</span>
                </h1>
                <p class="text-lg text-zinc-400 leading-relaxed max-w-[40ch] mb-10">
                    Thuật toán đồng bộ tần số điện ảnh. Kết nối bạn với những người chung gu thưởng thức nghệ thuật thứ 7.
                </p>
                <div class="flex items-center gap-4">
                    <button class="bg-white text-black px-8 py-4 rounded-full text-base font-semibold tracking-wide hover:bg-zinc-200 transition-colors shadow-[0_0_40px_rgba(255,255,255,0.1)]">
                        Bắt đầu ghép đôi
                    </button>
                </div>
            </div>

            <!-- Right Interactive Card Stack -->
            <div class="relative h-[600px] flex items-center justify-center">
                <!-- Top Card -->
                <article class="absolute w-[320px] aspect-[3/4] rounded-3xl bg-surface border border-white/10 shadow-2xl overflow-hidden card-stack-1 hover-lift cursor-grab">
                    <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=800&q=80" alt="Hồ sơ Bảo Anh" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-base via-base/40 to-transparent pointer-events-none"></div>
                    <div class="absolute bottom-0 left-0 w-full p-6 text-white">
                        <h2 class="text-3xl font-display font-bold mb-1">Bảo Anh, 24</h2>
                        <p class="text-zinc-300 text-sm mb-4">"Nolan là tín ngưỡng, Sci-fi là chân lý."</p>
                        <div class="flex flex-wrap gap-2 mb-6">
                            <span class="text-[10px] bg-white/10 border border-white/10 px-2 py-1 rounded-full backdrop-blur">Viễn Tưởng</span>
                            <span class="text-[10px] bg-white/10 border border-white/10 px-2 py-1 rounded-full backdrop-blur">Hack Não</span>
                        </div>
                        <div class="flex gap-4">
                            <button class="flex-1 bg-surface-high hover:bg-zinc-700 text-white py-3 rounded-full flex justify-center items-center transition-colors" aria-label="Bỏ qua">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
                            </button>
                            <button class="flex-1 bg-accent hover:bg-accent-hover text-white py-3 rounded-full flex justify-center items-center transition-colors shadow-[0_0_20px_rgba(190,18,60,0.5)]" aria-label="Ghép đôi">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                            </button>
                        </div>
                    </div>
                </article>

                <!-- Cards behind -->
                <div class="absolute w-[320px] aspect-[3/4] rounded-3xl bg-surface-high border border-white/5 shadow-2xl overflow-hidden card-stack-2"></div>
                <div class="absolute w-[320px] aspect-[3/4] rounded-3xl bg-zinc-800 border border-white/5 shadow-2xl overflow-hidden card-stack-3"></div>
            </div>

        </div>
    </main>
</body>
</html>
