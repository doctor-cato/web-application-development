<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3HD2K - XCine Match</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Main Style sheet -->
    <link rel="stylesheet" href="/shared/css/main.css">
    <link rel="stylesheet" href="/engagement/dating/css/style.css">
</head>
<body class="dating-body noise-bg">
    <!-- Navbar Placeholder -->
    <div id="navbar-placeholder"></div>

    <!-- MAIN LANDING HERO -->
    <main class="dating-main">
        <!-- Blurred Background Effects -->
        <div class="blur-bg-container">
            <div class="blur-circle-1"></div>
            <div class="blur-circle-2"></div>
        </div>

        <div class="dating-content-wrapper">
            <!-- Left Text Area -->
            <div class="dating-text-area">
                <span class="dating-tag">Kết Nối Điện Ảnh</span>
                <h1 class="dating-title font-['Bebas_Neue'] font-bold uppercase">
                    TÌM <br> TRI KỶ <br> <span class="highlight">XEM PHIM</span>
                </h1>
                <p class="dating-desc">
                    Thuật toán đồng bộ tần số điện ảnh. Kết nối bạn với những người chung gu thưởng thức nghệ thuật thứ 7.
                </p>
                <div class="dating-actions">
                    <button class="dating-btn">Bắt đầu ghép đôi</button>
                </div>
            </div>

            <!-- Right Interactive Card Stack -->
            <div class="card-stack-container">
                <!-- Top Card -->
                <article class="dating-card card-stack-1">
                    <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=800&q=80" alt="Hồ sơ Bảo Anh" class="card-img">
                    <div class="card-gradient"></div>
                    <div class="card-info">
                        <h2 class="card-name font-['Bebas_Neue'] font-bold tracking-wide">Bảo Anh, 24</h2>
                        <p class="card-quote">"Nolan là tín ngưỡng, Sci-fi là chân lý."</p>
                        <div class="card-tags">
                            <span class="card-tag-pill">Viễn Tưởng</span>
                            <span class="card-tag-pill">Hack Não</span>
                        </div>
                        <div class="card-actions">
                            <button class="btn-reject" aria-label="Bỏ qua">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
                            </button>
                            <button class="btn-match" aria-label="Ghép đôi">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                            </button>
                        </div>
                    </div>
                </article>

                <!-- Cards behind -->
                <div class="dating-card card-stack-2"></div>
                <div class="dating-card card-stack-3"></div>
            </div>
        </div>
    </main>
    
    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- Inject Components -->
    <script type="module" src="/shared/components/navbar.js"></script>
    <script type="module" src="/shared/components/footer.js"></script>
</body>
</html>
