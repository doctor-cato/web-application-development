<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>3HD2K | Đặt đồ ăn</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="/shared/css/main.css">
    <link rel="stylesheet" href="/shared/css/style.css">
    <link rel="stylesheet" href="/shared/css/tailwind-legacy.css">
    <link rel="stylesheet" href="/booking/css/booking.css">

    <style>
        .food-grid {
            display: flex;
            gap: 1.5rem;
            overflow-x: auto;
            padding-bottom: 1.5rem;
            scroll-snap-type: x mandatory;
        }

        .food-card {
            scroll-snap-align: start;
            min-width: 320px;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            transition: transform 0.3s ease;
        }

        .food-card:hover {
            transform: translateY(-4px);
        }

        .food-media {
            height: 200px;
            border-radius: 12px;
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
        }

        .food-media::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        }

        .food-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: auto;
        }

        .qty-control {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255,255,255,0.05);
            padding: 0.25rem;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
        }

        .qty-btn {
            width: 28px;
            height: 28px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .qty-btn:hover {
            background: var(--primary-red);
        }

        .qty-value {
            font-weight: bold;
            width: 20px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div id="navbar-placeholder"></div>

    <main class="booking-page-container">
        
        <div class="checkout-header" style="text-align: center; margin-bottom: 0;">
            <h1>Bắp Nước</h1>
            <p>Chọn combo yêu thích của bạn</p>
        </div>

        <div class="booking-grid booking-grid-checkout">
            
            <!-- LEFT: Items -->
            <div class="booking-panel">
                
                <h2 class="booking-section-title">Combo Phổ Biến</h2>
                
                <div class="food-grid">
                    <!-- Card 1 -->
                    <div class="glass-panel booking-card food-card">
                        <div class="food-media" style="background-image: url('https://www.cgv.vn/media/concession/web/631ade8215967_1662693006.png'); background-color: #f5f5f5;"></div>
                        <div>
                            <h3 style="font-family: 'Bebas Neue'; font-size: 1.5rem; letter-spacing: 1px;">Combo 1 Người</h3>
                            <div style="color: var(--primary-red); font-weight: bold; font-size: 1.25rem;">65.000 đ</div>
                            <p style="color: var(--text-muted); font-size: 0.875rem; margin-top: 0.5rem;">1 Bắp lớn + 1 Nước ngọt lớn</p>
                        </div>
                        <div class="food-controls">
                            <div class="qty-control">
                                <button class="qty-btn">-</button>
                                <span class="qty-value">0</span>
                                <button class="qty-btn">+</button>
                            </div>
                            <button class="btn btn-primary" style="padding: 0.5rem 1rem;">THÊM</button>
                        </div>
                    </div>

                    <!-- Card 2 -->
                    <div class="glass-panel booking-card food-card">
                        <div class="food-media" style="background-image: url('https://www.cgv.vn/media/concession/web/631ade969f696_1662693016.png'); background-color: #f5f5f5;"></div>
                        <div>
                            <h3 style="font-family: 'Bebas Neue'; font-size: 1.5rem; letter-spacing: 1px;">Combo 2 Người</h3>
                            <div style="color: var(--primary-red); font-weight: bold; font-size: 1.25rem;">95.000 đ</div>
                            <p style="color: var(--text-muted); font-size: 0.875rem; margin-top: 0.5rem;">1 Bắp lớn + 2 Nước ngọt lớn</p>
                        </div>
                        <div class="food-controls">
                            <div class="qty-control">
                                <button class="qty-btn">-</button>
                                <span class="qty-value">0</span>
                                <button class="qty-btn">+</button>
                            </div>
                            <button class="btn btn-primary" style="padding: 0.5rem 1rem;">THÊM</button>
                        </div>
                    </div>
                </div>

            </div>

            <!-- RIGHT: Summary -->
            <div class="booking-panel">
                <div class="glass-panel booking-card" style="position: sticky; top: 100px;">
                    <h2 class="booking-section-title">Giỏ Hàng</h2>
                    
                    <div style="min-height: 100px; display: flex; align-items: center; justify-content: center;">
                        <p style="color: var(--text-muted); font-size: 0.875rem; font-style: italic;">Chưa có món nào được chọn.</p>
                    </div>

                    <div class="summary-total">
                        <span style="color: var(--text-muted);">Tổng cộng:</span>
                        <span class="summary-total-price">0 đ</span>
                    </div>

                    <a href="/booking/checkout/checkout.html" class="btn btn-primary btn-continue" style="margin-top: 1rem; text-decoration: none;">
                        TIẾP TỤC
                    </a>
                </div>
            </div>

        </div>

    </main>

    <div id="footer-placeholder"></div>

    <script type="module" src="/shared/components/navbar.js"></script>
    <script type="module" src="/shared/components/footer.js"></script>
</body>
</html>
