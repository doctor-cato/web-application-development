<!DOCTYPE html>
<html class="dark" lang="vi">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>3HD2K Cinema — Đặt Vé Xem Phim Online</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../shared/css/style.css">

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-container":         "#e50914",
                        "background":                "#121414",
                        "surface-variant":           "#343535",
                        "secondary":                 "#c8c6c5",
                        "surface-container-low":     "#1a1c1c",
                        "surface-container-lowest":  "#0d0e0f"
                    },
                    fontFamily: { mono: ["'Courier New'", "Courier", "monospace"] }
                }
            }
        }
    </script>
</head>

<body class="bg-background antialiased text-white min-h-screen flex flex-col font-['Inter']">

    <!-- ═══════════ HEADER / NAVBAR ═══════════ -->
    <header class="w-full z-50 px-8 h-20 flex items-center justify-between border-b border-surface-variant bg-surface-container-low sticky top-0">
        <!-- Logo -->
        <a class="font-['Bebas_Neue'] text-[48px] text-primary-container font-bold tracking-tighter leading-none hover:scale-105 transition-transform duration-200" href="../home/index.html">3HD2K</a>

        <!-- Genre filter (desktop) -->
        <nav id="genre-nav" class="hidden md:flex items-center gap-1 text-sm font-medium text-secondary">
            <button data-genre="all"      class="genre-btn active px-3 py-1.5 rounded-full hover:text-white transition">Tất cả</button>
            <button data-genre="action"   class="genre-btn px-3 py-1.5 rounded-full hover:text-white transition">Hành động</button>
            <button data-genre="animation"class="genre-btn px-3 py-1.5 rounded-full hover:text-white transition">Hoạt hình</button>
            <button data-genre="drama"    class="genre-btn px-3 py-1.5 rounded-full hover:text-white transition">Tâm lý</button>
            <button data-genre="scifi"    class="genre-btn px-3 py-1.5 rounded-full hover:text-white transition">Khoa học</button>
        </nav>

        <!-- Auth area (rendered by navbar.js) -->
        <div id="navbar-auth" class="flex items-center gap-3">
            <!-- Skeleton — sẽ được render bởi js/components/navbar.js -->
            <a href="../auth/login.html"    class="text-sm font-semibold text-secondary hover:text-white transition">Đăng nhập</a>
            <a href="../auth/register.html" class="text-sm font-semibold bg-primary-container hover:bg-red-700 transition text-white px-4 py-2 rounded-lg">Đăng ký</a>
        </div>
    </header>

    <main class="flex-grow">

        <!-- ═══════════ HERO BANNER ═══════════ -->
        <section id="hero-section" class="relative w-full h-[60vh] min-h-[400px] max-h-[620px] overflow-hidden">
            <!-- Background image — cập nhật bởi index.js -->
            <div id="hero-bg" class="absolute inset-0 bg-surface-variant">
                <img id="hero-img"
                     src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=1400&auto=format&fit=crop"
                     alt="Banner"
                     class="w-full h-full object-cover opacity-60">
            </div>
            <!-- Gradient overlay -->
            <div class="absolute inset-0 bg-gradient-to-r from-background via-background/70 to-transparent"></div>
            <div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent"></div>

            <!-- Content -->
            <div id="hero-content" class="relative z-10 h-full flex flex-col justify-end px-8 md:px-16 pb-10 max-w-2xl">
                <div id="hero-badges" class="flex flex-wrap gap-2 mb-3"></div>
                <h2 id="hero-title" class="font-['Bebas_Neue'] text-5xl md:text-6xl text-white leading-none tracking-wide">
                    Đang Tải...
                </h2>
                <p id="hero-synopsis" class="text-secondary text-sm mt-3 line-clamp-2 max-w-xl"></p>
                <div class="flex gap-3 mt-5">
                    <a id="hero-btn-book"
                       href="#"
                       class="bg-primary-container hover:bg-red-700 transition text-white font-bold px-6 py-3 rounded-xl flex items-center gap-2 text-sm uppercase tracking-wider">
                        <span class="material-symbols-outlined text-[18px]">confirmation_number</span>
                        Đặt Vé Ngay
                    </a>
                    <a id="hero-btn-detail"
                       href="#"
                       class="bg-white/10 hover:bg-white/20 border border-white/20 transition text-white font-semibold px-6 py-3 rounded-xl flex items-center gap-2 text-sm">
                        <span class="material-symbols-outlined text-[18px]">info</span>
                        Chi Tiết
                    </a>
                </div>
            </div>
        </section>

        <!-- ═══════════ NOW SHOWING ═══════════ -->
        <section class="px-8 md:px-12 py-10">
            <div class="flex items-center justify-between mb-6">
                <h2 class="font-['Bebas_Neue'] text-3xl tracking-wide text-white">
                    <span class="text-primary-container">●</span> Đang Chiếu
                </h2>
                <span id="now-showing-count" class="text-secondary text-sm"></span>
            </div>

            <!-- Movie grid — populated by index.js -->
            <div id="now-showing-grid"
                 class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
                <!-- Skeleton cards while loading -->
                <div class="animate-pulse bg-surface-container-low rounded-xl aspect-[2/3]"></div>
                <div class="animate-pulse bg-surface-container-low rounded-xl aspect-[2/3]"></div>
                <div class="animate-pulse bg-surface-container-low rounded-xl aspect-[2/3]"></div>
                <div class="animate-pulse bg-surface-container-low rounded-xl aspect-[2/3]"></div>
                <div class="animate-pulse bg-surface-container-low rounded-xl aspect-[2/3]"></div>
            </div>
        </section>

        <!-- ═══════════ COMING SOON ═══════════ -->
        <section class="px-8 md:px-12 py-6 pb-12">
            <div class="flex items-center justify-between mb-6">
                <h2 class="font-['Bebas_Neue'] text-3xl tracking-wide text-white">
                    <span class="text-amber-400">◆</span> Sắp Chiếu
                </h2>
            </div>

            <!-- Coming soon grid — populated by index.js -->
            <div id="coming-soon-grid"
                 class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
                <!-- Populated by js/pages/index.js -->
            </div>
        </section>

    </main>

    <!-- ═══════════ FOOTER ═══════════ -->
    <footer class="bg-surface-container-lowest border-t border-surface-variant px-8 py-6">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4 text-xs text-secondary">
            <span class="font-['Bebas_Neue'] text-2xl tracking-tighter text-primary-container">3HD2K</span>
            <div class="flex gap-6">
                <a href="#" class="hover:text-white transition">Giới thiệu</a>
                <a href="#" class="hover:text-white transition">Điều khoản</a>
                <a href="#" class="hover:text-white transition">Liên hệ</a>
            </div>
            <div>© 2026 3HD2K Cinema. All rights reserved.</div>
        </div>
    </footer>

    <!-- ═══════════ SCRIPTS ═══════════ -->
    <script type="module" src="index.js"></script>

</body>
</html>
