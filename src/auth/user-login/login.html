<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Đăng nhập - 3HD2K Cinema</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="/shared/css/main.css">
    <link rel="stylesheet" href="/auth/auth-services/auth.css">
</head>
<body class="auth-page">
    <div id="navbar-placeholder"></div>

    <main class="auth-main">
        <a href="/explore/home-page/index.html" class="auth-back-btn">
            <span class="material-symbols-outlined">arrow_back</span>
            <span>Về trang chủ</span>
        </a>

        <!-- Left Hero Section -->
        <div class="auth-hero">
            <div class="auth-hero-bg">
                <img class="auth-hero-img" src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=2025&auto=format&fit=crop" alt="Cinema">
            </div>
            <h1 class="auth-hero-title">
                Trải Nghiệm Điện Ảnh <br/><span class="auth-hero-highlight">Đỉnh Cao</span>
            </h1>
        </div>

        <!-- Right Form Section -->
        <div class="auth-form-wrapper">
            <div class="auth-form-container">
                <div class="auth-tabs">
                    <a href="/auth/user-login/login.html" class="auth-tab active">Đăng Nhập</a>
                    <a href="/auth/user-register/register.html" class="auth-tab inactive">Đăng Ký</a>
                </div>

                <form id="login-form" action="/index.html" method="GET" class="auth-form">
                    <div id="login-error" style="color: #e50914; background: rgba(229, 9, 20, 0.1); padding: 10px; border-radius: 6px; margin-bottom: 15px; display: none; font-size: 0.9rem; text-align: center;"></div>
                    
                    <div class="form-group">
                        <label class="form-label" for="email">Email</label>
                        <div class="input-wrapper">
                            <span class="material-symbols-outlined input-icon">person</span>
                            <input class="form-input" type="email" id="email" name="email" placeholder="example@email.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">Mật khẩu</label>
                        <div class="input-wrapper">
                            <span class="material-symbols-outlined input-icon">lock</span>
                            <input class="form-input" type="password" id="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn">Đăng Nhập</button>
                </form>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        const loginForm = document.getElementById('login-form');
        const loginError = document.getElementById('login-error');
        
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault(); 
            loginError.style.display = 'none';
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            let users = JSON.parse(localStorage.getItem('registeredUsers') || '[]');
            const matchedUser = users.find(u => u.email === email && u.password === password);
            
            if (matchedUser) {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userName', matchedUser.fullname);
                localStorage.setItem('userAvatar', matchedUser.avatar);
                localStorage.setItem('userEmail', matchedUser.email);
                window.location.href = '../../index.html';
            } else {
                loginError.textContent = "Sai email hoặc mật khẩu! Vui lòng thử lại hoặc đăng ký tài khoản.";
                loginError.style.display = 'block';
            }
        });
    </script>
    <script type="module" src="/shared/components/navbar.js"></script>
    <script type="module" src="/shared/components/footer.js"></script>
</body>
</html>
