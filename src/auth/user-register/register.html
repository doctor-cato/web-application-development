<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Đăng ký - 3HD2K Cinema</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="/shared/css/main.css">
    <link rel="stylesheet" href="/auth/auth-services/auth.css">
</head>
<body class="auth-page">
    <div id="navbar-placeholder"></div>

    <main class="auth-main">
        <a href="/explore/home-page/index.html" class="auth-back-btn">
            <span class="material-symbols-outlined">arrow_back</span>
            <span>Về trang chủ</span>
        </a>

        <!-- Left Hero Section -->
        <div class="auth-hero">
            <div class="auth-hero-bg">
                <img class="auth-hero-img" src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=2025&auto=format&fit=crop" alt="Cinema">
            </div>
            <h1 class="auth-hero-title">
                Trải Nghiệm Điện Ảnh <br/><span class="auth-hero-highlight">Đỉnh Cao</span>
            </h1>
        </div>

        <!-- Right Form Section -->
        <div class="auth-form-wrapper">
            <div class="auth-form-container">
                <div class="auth-tabs">
                    <a href="/auth/user-login/login.html" class="auth-tab inactive">Đăng Nhập</a>
                    <a href="/auth/user-register/register.html" class="auth-tab active">Đăng Ký</a>
                </div>

                <form action="/auth/user-login/login.html" method="GET" class="auth-form">
                    
                    <div class="avatar-container">
                        <img id="avatar-preview" class="avatar-preview" src="/shared/images/avatar.jpg" alt="Ảnh đại diện">
                        <input type="file" id="avatar-input" accept="image/*" style="display: none;">
                        <div class="avatar-upload-btn" onclick="document.getElementById('avatar-input').click()">
                            <span class="material-symbols-outlined" style="font-size:16px;">edit</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="fullname">Họ và tên</label>
                        <div class="input-wrapper">
                            <span class="material-symbols-outlined input-icon">badge</span>
                            <input class="form-input" type="text" id="fullname" placeholder="Nguyễn Văn A" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="email">Email</label>
                        <div class="input-wrapper">
                            <span class="material-symbols-outlined input-icon">mail</span>
                            <input class="form-input" type="email" id="email" placeholder="example@email.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="phone">Số điện thoại</label>
                        <div class="input-wrapper">
                            <span class="material-symbols-outlined input-icon">phone_iphone</span>
                            <input class="form-input" type="tel" id="phone" placeholder="0901234567" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">Mật khẩu</label>
                        <div class="input-wrapper">
                            <span class="material-symbols-outlined input-icon">lock</span>
                            <input class="form-input" type="password" id="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn">Đăng Ký Tài Khoản</button>
                </form>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        const avatarInput = document.getElementById('avatar-input');
        const avatarPreview = document.getElementById('avatar-preview');

        avatarInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(evt) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 150;
                        const MAX_HEIGHT = 150;
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_WIDTH) {
                                height *= MAX_WIDTH / width;
                                width = MAX_WIDTH;
                            }
                        } else {
                            if (height > MAX_HEIGHT) {
                                width *= MAX_HEIGHT / height;
                                height = MAX_HEIGHT;
                            }
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        avatarPreview.src = canvas.toDataURL('image/jpeg', 0.7);
                    };
                    img.src = evt.target.result;
                }
                reader.readAsDataURL(file);
            }
        });

        const registerForm = document.querySelector('form');
        registerForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const fullname = document.getElementById('fullname').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const avatar = avatarPreview.src;

            const user = {
                fullname,
                email,
                phone,
                password,
                avatar
            };

            let users = JSON.parse(localStorage.getItem('registeredUsers') || '[]');
            
            if(users.some(u => u.email === email)) {
                alert("Email này đã được đăng ký!");
                return;
            }

            users.push(user);
            localStorage.setItem('registeredUsers', JSON.stringify(users));
            
            alert("Đăng ký thành công! Vui lòng đăng nhập.");
            window.location.href = '../user-login/login.html';
        });
    </script>
    <script type="module" src="/shared/components/navbar.js"></script>
    <script type="module" src="/shared/components/footer.js"></script>
</body>
</html>
