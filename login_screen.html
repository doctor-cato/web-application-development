<a class="font-display-lg text-headline-xl tracking-tighter hover:scale-105 transition-transform duration-200 block text-[#e50914] font-bold" href="src/explore/home-page/index.html" style="color: rgb(229, 9, 20);">3HD2K</a>

<!-- Auth Container -->
<div class="relative z-20 w-full max-w-md px-margin-mobile md:px-0 py-section-gap">
<!-- Glassmorphism Card (Updated to solid dark) -->
<div class="bg-[#1a1c1c] border border-surface-variant p-8 md:p-10 rounded-DEFAULT shadow-2xl relative overflow-hidden group">
<!-- Tab Navigation (Login / Register) -->
<div class="flex border-b border-surface-variant mb-8 relative">
<button class="flex-1 pb-4 text-center font-headline-lg text-headline-lg text-on-background border-b-2 border-primary-container transition-colors tracking-wide uppercase" id="tab-login" onclick="switchTab('login')">ĐĂNG NHẬP</button>

</div>
<!-- Login Form -->
<form class="space-y-6 block" id="form-login">
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-white">Email hoặc Số điện thoại</label>
<input class="w-full bg-surface-container-high border border-surface-variant focus:border-primary-container focus:ring-0 px-4 py-3 font-body-md text-body-md rounded-DEFAULT transition-colors placeholder:text-secondary-container text-white" placeholder="Nhập email hoặc số điện thoại" type="text"/>
</div>
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-white">Mật khẩu</label>
<input class="w-full bg-surface-container-high border border-surface-variant focus:border-primary-container focus:ring-0 px-4 py-3 font-body-md text-body-md rounded-DEFAULT transition-colors placeholder:text-secondary-container text-white" placeholder="Nhập mật khẩu" type="password"/>
</div>
<div class="flex justify-end">
<a class="font-label-sm text-label-sm hover:text-primary-container transition-colors text-white italic" href="#">Quên mật khẩu?</a>
</div>
<a class="w-full bg-primary-container text-on-primary-container font-headline-lg text-headline-lg tracking-wide uppercase py-3 rounded-DEFAULT hover:bg-primary-container/90 hover:scale-[1.02] transition-all duration-300 shadow-lg shadow-primary-container/20 mt-2 flex items-center justify-center underline-none font-bold" href="src/explore/home-page/index.html">

                </a>
</form>

<div class="space-y-1">
<label class="font-label-sm text-label-sm text-white">Email</label>

</div>

</button>

<!-- Script for Tab Switching -->
<script>
        function switchTab(tab) {
            const loginForm = document.getElementById('form-login');
            const registerForm = document.getElementById('form-register');
            const loginTab = document.getElementById('tab-login');
            const registerTab = document.getElementById('tab-register');

            if (tab === 'login') {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                
                loginTab.classList.add('text-on-background', 'border-b-2', 'border-primary-container');
                loginTab.classList.remove('text-white/70');
                
                registerTab.classList.remove('text-on-background', 'border-b-2', 'border-primary-container');
                registerTab.classList.add('text-white/70');
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                
                registerTab.classList.add('text-on-background', 'border-b-2', 'border-primary-container');
                registerTab.classList.remove('text-white/70');
                
                loginTab.classList.remove('text-on-background', 'border-b-2', 'border-primary-container');
                loginTab.classList.add('text-white/70');
            }
        }
    </script>
